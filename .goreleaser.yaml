version: 2

project_name: storetheindex

builds:
  - id: storetheindex
    main: .
    binary: storetheindex
    ldflags:
      - -s -w
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    mod_timestamp: '{{.CommitTimestamp}}'
    env:
      - CGO_ENABLED=1
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

release:
  mode: keep-existing

changelog:
  disable: true

dockers:
  # AMD64 image
  - image_templates:
      - "ghcr.io/storacha/storetheindex:{{ .Version }}-amd64"
    dockerfile: Dockerfile.release
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"

  # ARM64 image
  - image_templates:
      - "ghcr.io/storacha/storetheindex:{{ .Version }}-arm64"
    dockerfile: Dockerfile.release
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"

docker_manifests:
  - name_template: "ghcr.io/storacha/storetheindex:{{ .Version }}"
    image_templates:
      - "ghcr.io/storacha/storetheindex:{{ .Version }}-amd64"
      - "ghcr.io/storacha/storetheindex:{{ .Version }}-arm64"
